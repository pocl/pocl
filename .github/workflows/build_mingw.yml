---
name: Windows / MinGW / CPU tests

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
      - 'release*'
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'CHANGES'
      - 'COPYING'
      - 'CREDITS'
      - 'LICENSE'
      - 'README.*'
      - 'tools/docker/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  mingw_test_matrix:
    name: LLVM ${{ matrix.llvm_version }} - ${{ matrix.config }} - shared libs:${{ matrix.shared_libs }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        llvm_version: [19]
        shared_libs: [ON, OFF]
        config: [cpu]

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-hwloc
            mingw-w64-x86_64-pkg-config

      - name: Checkout PoCL
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Build Environment
        run: |
          # Convert the Windows workspace path to an MSYS2 compatible one
          WORKSPACE=$(cygpath -u "${{ github.workspace }}")
          echo "WORKSPACE=${WORKSPACE}" >> $GITHUB_ENV
          if [ ${{ github.ref == 'main' || startsWith(github.ref, 'release_') }} -ne 0 ]; then
            POCL_INSTALL_PREFIX="/c/PoCL"
          else
            POCL_INSTALL_PREFIX="${{ env.WORKSPACE }}/install-pocl"
          fi
          echo "POCL_INSTALL_PREFIX=${POCL_INSTALL_PREFIX}" >> $GITHUB_ENV

      - name: Restore Cached LLVM
        id: cache-llvm
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: install-llvm
          key: llvm-mingw-${{ matrix.llvm_version }}-${{ runner.os }}

      - if: ${{ steps.cache-llvm.outputs.cache-hit != 'true' }}
        name: Checkout LLVM
        id: checkout-llvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: llvm/llvm-project
          ref: release/${{ matrix.llvm_version }}.x
          path: llvm-project

      - if: ${{ steps.cache-llvm.outputs.cache-hit != 'true' }}
        name: Configure LLVM
        run: |
          cmake -S llvm-project/llvm -B build-llvm \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DLLVM_TARGETS_TO_BUILD=host \
            -DCMAKE_INSTALL_PREFIX=${{ env.WORKSPACE }}/install-llvm \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -G "Ninja"
        # XXX: DYLIBs are necessary to work around export ordinal overflows

      - if: ${{ steps.cache-llvm.outputs.cache-hit != 'true' }}
        name: Build LLVM
        run: |
          cmake --build build-llvm
          cmake --install build-llvm

      - if: ${{ steps.cache-llvm.outputs.cache-hit != 'true' }}
        name: Save LLVM
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: install-llvm
          key: llvm-mingw-${{ matrix.llvm_version }}-${{ runner.os }}

      - name: Load Env vars
        id: load-env
        run: |
          cat ${{ env.WORKSPACE }}/.github/variables.txt >> $GITHUB_ENV

      - name: Configure PoCL
        run: |
          if [ ${{ github.ref == 'main' || startsWith(github.ref, 'release_') }} -ne 0 ]; then
            echo "Static linking libLLVM"
            EXTRA_FLAGS="-DSTATIC_LLVM=1 -DKERNELLIB_HOST_CPU_VARIANTS=distro"
          else
            echo "Dynamic linking libLLVM"
            EXTRA_FLAGS="-DLLC_HOST_CPU=haswell"
          fi

          BUILD_FLAGS="-O1 -march=x86-64-v2 -Wall -Wextra -Wno-unused-parameter -Wno-unused-variable"
          cmake -S ${{ env.WORKSPACE }} -B ${{ env.WORKSPACE }}/build-pocl \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_C_FLAGS_RELEASE=${BUILD_FLAGS}"  "-DCMAKE_CXX_FLAGS_RELEASE=${BUILD_FLAGS}" \
            -DCMAKE_INSTALL_PREFIX=${{ env.POCL_INSTALL_PREFIX }} \
            -DWITH_LLVM_CONFIG=${{ env.WORKSPACE }}/install-llvm/bin/llvm-config.exe \
            -DBUILD_SHARED_LIBS=${{ matrix.shared_libs }} \
            -DENABLE_ICD=OFF $EXTRA_FLAGS \
            -DENABLE_LOADABLE_DRIVERS=${{ matrix.shared_libs }} \
            -G "Ninja"
        # XXX: ENABLE_ICD=OFF because ocl-icd doesn't support Windows,
        #      and PoCL's tests do not support Khronos' ICD loader

      - name: Build PoCL
        run: |
          cmake --build ${{ env.WORKSPACE }}/build-pocl --target install

      - name: Run Tests
        env:
          POCL_CACHE_DIR: "${{ runner.temp }}/GH_POCL_CACHE"
        timeout-minutes: 120
        run: |
          rm -rf ${{ env.POCL_CACHE_DIR }}
          mkdir -p ${{ env.POCL_CACHE_DIR }}
          cd ${{ env.WORKSPACE }}/build-pocl
          export PATH=${{ env.WORKSPACE }}/install-llvm/bin:$PATH
          ${{ env.WORKSPACE }}/tools/scripts/run_cpu_tests mingw $CTEST_FLAGS -j$(nproc)

      - name: Archive Artifacts
        run: |
          C:/msys64/usr/bin/tar.exe -cvf D:/a/_temp/pocl_llvm_${{ matrix.llvm }}_${{ github.sha }}.tar ${{ env.POCL_INSTALL_PREFIX }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: "PoCL-MinGW-x86_64-LLVM_${{ matrix.llvm }}-${{ github.ref }}-${{ github.sha }}"
          path: "D:/a/_temp/pocl_llvm_${{ matrix.llvm }}_${{ github.sha }}.tar"
          if-no-files-found: error
          compression-level: 4
